    <path id="shape" d="m 449.13763,335.7306 a 79,79 0 0 1 0.7,-112.5 80,80 0 0 0 -113.1,-113.099998 79,79 0 0 1 -112.6,0.7 80.7,80.7 0 0 0 -113.399996,-1.1 c -31.5999999,31.1 -31.5999999,82.099998 -0.3,113.499998 31.3,31.4 30.5,82.7 0.7,112.5 a 80.7,80.7 0 0 0 -1.1,113.4 80,80 0 0 0 113.499996,0.4 79,79 0 0 1 113.2,0 80,80 0 0 0 113.5,-0.4 c 31,-31.4 30,-82.2 -1.1,-113.4 z"/>
  </defs>
  <rect width="560" height="560" fill="white"/>
