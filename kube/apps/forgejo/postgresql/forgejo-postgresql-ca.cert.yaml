apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: forgejo-postgresql-ca
  namespace: forgejo
spec:
  isCA: true
  commonName: forgejo-postgresql-ca
  secretName: forgejo-postgresql-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: self-signed
    kind: ClusterIssuer

