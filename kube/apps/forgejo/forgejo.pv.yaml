apiVersion: v1
kind: PersistentVolume
metadata:
  name: forgejo-shared-storage
  labels:
    app.kubernetes.io/name: forgejo
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  storageClassName: longhorn
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeAttributes:
      numberOfReplicas: '1'
      staleReplicaTimeout: '2880'
    volumeHandle: forgejo-shared-storage
