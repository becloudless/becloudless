apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: immich-postgresql-app
  namespace: immich
spec:
  secretName: immich-postgresql-app-tls
  secretTemplate:
    labels:
      cnpg.io/reload: ""
  usages:
    - client auth
  commonName: app
  issuerRef:
    name: immich-postgresql
    kind: Issuer

