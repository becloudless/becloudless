apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: immich-postgresql-ca
  namespace: ${INSTANCE:=immich}
spec:
  isCA: true
  commonName: immich-postgresql-ca
  secretName: immich-postgresql-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: self-signed
    kind: ClusterIssuer

