# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Dockerfiles

on:
  push:
  workflow_call:
    inputs:
      registry:
        description: "Container registry to push images to"
        required: false
        type: string
        default: "ghcr.io"
      registry_username:
        description: "Username for the container registry"
        required: false
        type: string
        default: ""
      bcl_version:
        description: "Version of the bcl CLI to use (defaults to version in nixos/packages/bcl/default.nix)"
        required: false
        type: string
        default: ""
      changes_paths:
        description: |
          Newline-separated list of path prefixes to check for changes.
          Defaults to dockerfiles/ and .github/workflows/dockerfiles.yaml.
        required: false
        type: string
        default: |
          dockerfiles/
          .github/workflows/dockerfiles.yaml
    secrets:
      registry_password:
        description: "Password/token for the container registry"
        required: false

jobs:
  changes:
    uses: becloudless/becloudless/.github/workflows/changes.yaml@main
    with:
      paths: ${{ inputs.changes_paths || 'dockerfiles/\n.github/workflows/dockerfiles.yaml\n' }}

  build:
    needs: changes
    if: needs.changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry || 'ghcr.io' }}
          username: ${{ inputs.registry_username || github.actor }}
          password: ${{ secrets.registry_password || secrets.GITHUB_TOKEN }}

      - name: Download bcl
        run: |
          if [ -n "${{ inputs.bcl_version }}" ]; then
            VERSION="${{ inputs.bcl_version }}"
          else
            VERSION="$(grep -E '^\s+version = ' nixos/packages/bcl/default.nix | sed 's/.*"\(.*\)".*/\1/')"
          fi
          mkdir -p cli/dist
          curl -fsSL "https://github.com/becloudless/becloudless/releases/download/cli-v${VERSION}/bcl-linux-amd64.tar.gz" \
            | tar -xz -C cli/dist
          chmod +x cli/dist/bcl-linux-amd64/bcl

      - name: Build/Push image
        run: cli/dist/bcl-linux-amd64/bcl ci docker -L trace
