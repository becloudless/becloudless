# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Check changes

on:
  workflow_call:
    inputs:
      path:
        description: Directory prefix to check for changes against origin/main (e.g. "dockerfiles/")
        required: true
        type: string
    outputs:
      changed:
        description: "true if any file under the given path changed on this branch compared to origin/main"
        value: ${{ jobs.check.outputs.changed }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changes in ${{ inputs.path }}
        id: changes
        run: |
          mainHash=$(git rev-parse origin/main)
          if git diff --name-only "$mainHash" "${{ github.sha }}" | grep -Eq "^${{ inputs.path }}"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

