# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/website.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@d60b41a563a30c28e2c4a40e37d21e8e0c3c2f55 # v5.5.0
        with:
          go-version-file: website/go.mod
          cache-dependency-path: website/go.sum

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6be7268e08f310b60ef14033f # v3.0.0
        with:
          hugo-version: latest
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Build
        working-directory: website
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
