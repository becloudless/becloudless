# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Nixos bcl hash update
on:
  push:
    branches-ignore:
      - main
    paths:
      - "nixos/packages/bcl/default.nix"

jobs:
  update-bcl-hashes:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: github-app-token
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.github-app-token.outputs.token }}

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Update hashes
        run: |
          set -euo pipefail
          FILE="nixos/packages/bcl/default.nix"
          VERSION="$(grep -E '^\s+version = ' "$FILE" | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION"

          for platform in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            url="https://github.com/becloudless/becloudless/releases/download/v${VERSION}/bcl-${platform}.tar.gz"
            hash="$(nix store prefetch-file --hash-type sha256 --json "$url" | jq -r .hash)"
            echo "platform=$platform hash=$hash"
            sed -i "s|\"${platform}\"  *=.*|\"${platform}\" = \"${hash}\";|" "$FILE"
          done

      - uses: iarekylew00t/verified-bot-commit@33985d44b7719dcaf0b854a0f4b0caad9bdc5b86 # v2.3.3
        with:
          ref: ${{ github.ref_name }}
          token: ${{ steps.github-app-token.outputs.token }}
          message: "Auto Update BCL Hashes"
          files: |
            nixos/packages/bcl/default.nix

