# General settings
set -sg escape-time 0
set -g default-terminal "screen-256color"
set -g history-limit 5000
set -g automatic-rename off
setw -g mode-keys vi

# Less stretching to get to the first item
set -g base-index 1
setw -g pane-base-index 1

set -g status-position bottom
set -g status-justify left

set -g status-left-length 150
set -g status-right-length 150
set -g status-interval 5


# Set prefix to C-t (t for tmux)
set -g prefix C-a
unbind C-b
bind C-t send-prefix

#mouse
set -g mouse on
bind-key -n DoubleClick1Pane select-pane

# so tmux's selection buffer is always copied to the system clipboard
set -g set-clipboard on

# Splitting
bind v split-window -h
bind h split-window -v
bind V select-layout even-vertical
bind H select-layout even-horizontal
bind S choose-session

bind c new-window -n ''
bind C-c new-window -n ''

bind A command-prompt "rename-window %%"
bind space next-window
bind C-space next-window
bind Bspace previous-window
bind C-Bspace previous-window
bind C-x previous-window
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"
#bind -n C-S-left previous-window
#bind -n C-S-right next-window
bind left select-pane -L
bind right select-pane -R
bind down select-pane -D
bind up select-pane -U
bind S-left resize-pane -L 10
bind S-right resize-pane -R 10
bind S-down resize-pan -D 10
bind S-up resize-pan -U 10


# copy
#bind-key -t vi-copy C-c copy-pipe "xsel -bi && tmux display-message \"ok!\""
bind-key p save-buffer ~/.tmux-buffer \; run-shell "xsel -i -b <~/.tmux-buffer && rm ~/.tmux-buffer && tmux display-message \"ok!\""


# Reload the config file
# bind R source-file ~/.tmux.conf \; display-message 'Config reloaded'

#set -g status-right  "#[fg=brightred]#(~/.bin/cpualert.sh 90)#[fg=default]     #(~/.bin/tmux-battery-time.sh)#[fg=default]#(~/.bin/tmux-battery.sh) "
set -g status-right  "#[fg=brightred]#(~/Work/bcl/bin/cpualert.sh)#[fg=default] "
set -g status-left '#[fg=brightblue] #h '
set -g window-status-format '#[fg=brightgreen] #I #W '
set -g window-status-current-format '#[fg=black,bg=magenta] #I #W '


################## --- colors (solarized dark)
# default statusbar colors
set -g status-bg black
set -g status-fg yellow
# pane number display
set -g display-panes-active-colour yellow
set -g display-panes-colour brightblue

# clock
setw -g clock-mode-colour yellow
# --- end colors


set -g @continuum-restore 'on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'




#Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
